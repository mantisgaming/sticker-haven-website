name: CI

on:
    push:
        branches:
            - main
            - dev
    pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

    svelte-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Svelte check
              run: npm run check

    e2e-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Run end-to-end tests
              run: npm run test:e2e

            - name: Upload Playwright artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-artifacts
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore
